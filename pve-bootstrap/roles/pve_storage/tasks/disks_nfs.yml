---
- name: "PVE Storage NFS | {{ pool.name }} - ensure nfs-common is installed"
  ansible.builtin.apt:
    name: nfs-common
    state: present
  when: pool.state == 'present'

- name: "PVE Storage NFS | {{ pool.name }} - verify NFS server is reachable"
  ansible.builtin.wait_for:
    host: "{{ pool.nfs.server }}"
    port: 2049
    timeout: 10
  when: pool.state == 'present'
  failed_when: false
  register: nfs_reachable

- name: "PVE Storage NFS | {{ pool.name }} - warn if NFS server unreachable"
  ansible.builtin.debug:
    msg: "WARNING: NFS server {{ pool.nfs.server }}:2049 is not reachable. PVE storage registration may fail."
  when:
    - pool.state == 'present'
    - nfs_reachable.failed | default(false)
