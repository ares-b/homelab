---
- name: "PVE Storage LVMthin | {{ pool.name }} - check if device exists"
  ansible.builtin.stat:
    path: "{{ pool.disk.device }}"
  register: disk_stat

- name: "PVE Storage LVMthin | {{ pool.name }} - fail if device not found"
  ansible.builtin.fail:
    msg: "Device {{ pool.disk.device }} does not exist on this host"
  when: not disk_stat.stat.exists

- name: "PVE Storage LVMthin | {{ pool.name }} - check if VG already exists"
  ansible.builtin.command:
    cmd: "vgs --noheadings -o vg_name {{ pool.lvmthin.vg_name }}"
  register: vg_check
  changed_when: false
  failed_when: false

- name: "PVE Storage LVMthin | {{ pool.name }} - create physical volume"
  ansible.builtin.command:
    cmd: "pvcreate {{ pool.disk.device }}"
  when:
    - pool.state == 'present'
    - vg_check.rc != 0

- name: "PVE Storage LVMthin | {{ pool.name }} - create volume group {{ pool.lvmthin.vg_name }}"
  ansible.builtin.command:
    cmd: "vgcreate {{ pool.lvmthin.vg_name }} {{ pool.disk.device }}"
  when:
    - pool.state == 'present'
    - vg_check.rc != 0

- name: "PVE Storage LVMthin | {{ pool.name }} - check if thin pool LV already exists"
  ansible.builtin.command:
    cmd: "lvs --noheadings -o lv_name {{ pool.lvmthin.vg_name }}/{{ pool.lvmthin.lv_name }}"
  register: lv_check
  changed_when: false
  failed_when: false

- name: "PVE Storage LVMthin | {{ pool.name }} - create thin pool"
  ansible.builtin.command:
    cmd: >-
      lvcreate -l {{ pool.lvmthin.lv_size | default('100%FREE') }}
      --thinpool {{ pool.lvmthin.lv_name }}
      {{ pool.lvmthin.vg_name }}
  when:
    - pool.state == 'present'
    - lv_check.rc != 0

- name: "PVE Storage LVMthin | {{ pool.name }} - remove VG on absent"
  ansible.builtin.command:
    cmd: "vgremove -f {{ pool.lvmthin.vg_name }}"
  when:
    - pool.state == 'absent'
    - vg_check.rc == 0
