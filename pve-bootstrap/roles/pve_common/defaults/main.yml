---
state: present

pve_common_repo_remove_enterprise: true
pve_common_repo_add_community: true
pve_common_ceph_release: ceph-squid

# Datacenter VM-console keyboard layout (QEMU -k). Keep en-us so Packer/
# automation boot_command typing is not corrupted. Empty string = leave as-is.
pve_common_datacenter_keyboard: en-us

pve_common_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - iotop
  - lsof
  - net-tools
  - dnsutils
  - tcpdump
  - smartmontools
  - nvme-cli
  - parted
  - lvm2
  - gdisk
  - xfsprogs
  - e2fsprogs
  - chrony
  - fail2ban
  - unattended-upgrades
  - apt-listchanges
  - postfix
  - mailutils
  - libsasl2-modules
  - ca-certificates
  - gnupg2
  - rsync
  - jq

pve_common_linux_users: []

pve_common_ssh_port: 22
pve_common_ssh_permit_root_login: "no"
pve_common_ssh_password_auth: "no"
pve_common_ssh_x11_forwarding: "no"
pve_common_ssh_authorized_keys: []

pve_common_timezone: UTC
pve_common_ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org
  - 3.pool.ntp.org

pve_common_ntp_allow:
  - 127.0.0.1
  - ::1

pve_common_sysctl_settings:
  vm.swappiness: 10
  vm.dirty_ratio: 20
  vm.dirty_background_ratio: 5
  # Increase inotify limits for many VMs/containers
  fs.inotify.max_user_watches: 1048576
  fs.inotify.max_user_instances: 512
  fs.inotify.max_queued_events: 16384
  net.core.rmem_max: 16777216
  net.core.wmem_max: 16777216
  net.core.somaxconn: 65535
  net.ipv4.tcp_max_syn_backlog: 65535
  # Prevent TIME_WAIT exhaustion
  net.ipv4.tcp_fin_timeout: 15
  net.ipv4.tcp_tw_reuse: 1
  kernel.panic: 10
  kernel.panic_on_oops: 1

pve_common_suppress_nag: true
