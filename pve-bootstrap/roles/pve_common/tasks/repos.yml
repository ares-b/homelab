---
- name: PVE Repos | Disable pve-enterprise suite via Enabled flag
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    regexp: '^Enabled:'
    line: 'Enabled: no'
    create: false
  when: pve_common_repo_remove_enterprise | bool
  failed_when: false

- name: PVE Repos | Disable Ceph enterprise repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/ceph.sources
    regexp: '^Enabled:'
    line: 'Enabled: no'
    create: false
  failed_when: false

- name: PVE Repos | Add no-subscription community repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_facts['distribution_release'] }}
      Components: pve-no-subscription
      Enabled: yes
    owner: root
    group: root
    mode: "0644"
  when: pve_common_repo_add_community | bool

- name: PVE Repos | Add Ceph no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph-no-subscription.sources
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/{{ pve_common_ceph_release }}
      Suites: {{ ansible_facts['distribution_release'] }}
      Components: no-subscription
      Enabled: yes
    owner: root
    group: root
    mode: "0644"
  when: pve_common_repo_add_community | bool

- name: PVE Repos | Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0
