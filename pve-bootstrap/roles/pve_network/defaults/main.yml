---
state: present

pve_network_ip_forward: true
pve_network_ipv6_forward: false

# Only touches vlan_aware and mtu flags; does not rewrite the full interfaces file.
pve_network_bridges:
  - name: vmbr0
    vlan_aware: true
    mtu: 1500

# Routed VM bridge, off by default so plain bridged networking on vmbr0 keeps
# working on any router. When on, an internal bridge gives VMs routable
# addresses and the upstream router needs a static route for the subnet to this
# host. cidr is the host address on the bridge and the VM gateway.
pve_network_routed_enabled: false
pve_network_routed_bridge: vmbr10
pve_network_routed_cidr: "10.0.0.1/24"

# Internet for the routed subnet. Enable when the upstream router will not NAT
# the subnet to the WAN: the host masquerades only WAN-bound traffic, LAN-bound
# traffic stays routed with real addresses.
pve_network_routed_snat: false
pve_network_routed_subnet: "10.0.0.0/24"
pve_network_routed_lan_subnet: "192.168.0.0/24"
pve_network_routed_uplink: vmbr0

