---
state: present

pve_network_ip_forward: true
pve_network_ipv6_forward: false

# Only touches vlan_aware and mtu flags; does not rewrite the full interfaces file.
pve_network_bridges:
  - name: vmbr0
    vlan_aware: true
    mtu: 1500

# Upstream router needs a static route to this host. cidr is the host address on the bridge (= VM gateway).
pve_network_routed_enabled: false
pve_network_routed_bridge: vmbr10
pve_network_routed_cidr: "10.0.0.1/24"

# Enable when the upstream router won't NAT the subnet. Only WAN-bound traffic is masqueraded.
pve_network_routed_snat: false
pve_network_routed_subnet: "10.0.0.0/24"
pve_network_routed_lan_subnet: "192.168.0.0/24"
pve_network_routed_uplink: vmbr0

