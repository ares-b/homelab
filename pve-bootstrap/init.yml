---
- name: Bootstrap pve secrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    config_file: "{{ playbook_dir }}/../config.sops.yaml"
    _tmp_key: /tmp/ansible_pve_init

  tasks:
    - name: Check for config file
      ansible.builtin.stat:
        path: "{{ config_file }}"
      register: _config_stat

    - name: Fail if config file missing
      ansible.builtin.fail:
        msg: "config.sops.yaml not found at {{ config_file }}."
      when: not _config_stat.stat.exists

    - name: Load existing config (SOPS-decrypted)
      ansible.builtin.set_fact:
        _cfg: "{{ lookup('community.sops.sops', config_file) | from_yaml }}"

    - name: Extract pve_bootstrap section
      ansible.builtin.set_fact:
        _existing: "{{ _cfg.pve_bootstrap | default({}) }}"

    - name: Decide what is missing
      ansible.builtin.set_fact:
        _need_key: "{{ not (_existing.pve_ansible_ssh_pub_key | default('')) or not (_existing.pve_ansible_ssh_private_key_b64 | default('')) }}"
        _need_tf_pw: "{{ not (_existing.pve_secret_password_terraform | default('')) }}"

    - name: Generate ansible_pve SSH keypair
      ansible.builtin.command:
        cmd: "ssh-keygen -t ed25519 -f {{ _tmp_key }} -C ansible@pve01 -N ''"
        creates: "{{ _tmp_key }}"
      when: _need_key | bool

    - name: Read generated keypair (pub then private)
      ansible.builtin.command:
        cmd: "cat {{ item }}"
      register: _kp
      changed_when: false
      no_log: true
      loop:
        - "{{ _tmp_key }}.pub"
        - "{{ _tmp_key }}"
      when: _need_key | bool

    - name: Generate terraform password
      ansible.builtin.command:
        cmd: "python3 -c 'import secrets; print(secrets.token_urlsafe(24))'"
      register: _pass_terraform
      changed_when: false
      no_log: true
      when: _need_tf_pw | bool

    - name: Assemble newly generated values
      ansible.builtin.set_fact:
        _generated: >-
          {{
            (_need_key | bool) | ternary({
              'pve_ansible_ssh_pub_key': (_kp.results[0].stdout | default('')),
              'pve_ansible_ssh_private_key_b64': (_kp.results[1].stdout | default('') | b64encode)
            }, {})
            | combine((_need_tf_pw | bool) | ternary({
              'pve_secret_password_terraform': (_pass_terraform.stdout | default(''))
            }, {}))
          }}

    - name: Secrets already complete, nothing to do
      ansible.builtin.debug:
        msg: "pve_bootstrap section already has the ansible key and terraform password; no changes."
      when: _generated | length == 0

    - name: Write merged config (plaintext; encrypted next)
      ansible.builtin.copy:
        dest: "{{ config_file }}"
        mode: "0600"
        content: "{{ _cfg | combine({'pve_bootstrap': _existing | combine(_generated)}, recursive=true) | to_nice_yaml(width=4096) }}"
      no_log: true
      when: _generated | length > 0

    - name: Encrypt config in place with SOPS
      ansible.builtin.command:
        cmd: "sops --encrypt --in-place {{ config_file }}"
      changed_when: true
      when: _generated | length > 0

    - name: Remove temp keypair
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ _tmp_key }}"
        - "{{ _tmp_key }}.pub"
      when: _need_key | bool
