---
- name: Bootstrap edge-access secrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    config_file: "{{ playbook_dir }}/../config.sops.yaml"
    _tmp_key: /tmp/ansible_lxc_edge_init

  tasks:
    - name: Check for existing config file
      ansible.builtin.stat:
        path: "{{ config_file }}"
      register: _config_stat

    - name: Fail if config file missing
      ansible.builtin.fail:
        msg: "config.sops.yaml not found at {{ config_file }}. Create it from the template first."
      when: not _config_stat.stat.exists

    - name: Load existing config (SOPS-decrypted)
      ansible.builtin.set_fact:
        _existing: "{{ lookup('community.sops.sops', config_file) | from_yaml }}"

    - name: Decide what is missing
      ansible.builtin.set_fact:
        _need_key: "{{ not (_existing.lxc.ssh_public_key | default('')) or not (_existing.lxc.ansible_ssh_private_key | default('')) }}"
        _need_lxc_psk: "{{ not (_existing.wireguard.psk_lxc | default('')) }}"
        _need_peer_psks: >-
          {{ (_existing.wireguard.extra_peers | default([])
              | map(attribute='preshared_key', default='')
              | select('equalto', '') | list | length) > 0 }}

    - name: Generate LXC ansible SSH keypair
      ansible.builtin.command:
        cmd: "ssh-keygen -t ed25519 -f {{ _tmp_key }} -C ansible@edge-gateway -N ''"
        creates: "{{ _tmp_key }}"
      when: _need_key | bool

    - name: Read generated keypair
      ansible.builtin.command:
        cmd: "cat {{ item }}"
      register: _kp
      changed_when: false
      no_log: true
      loop:
        - "{{ _tmp_key }}.pub"
        - "{{ _tmp_key }}"
      when: _need_key | bool

    - name: Set SSH keypair facts
      ansible.builtin.set_fact:
        _new_ssh_public_key: "{{ _kp.results[0].stdout }}"
        _new_ssh_private_key: "{{ (_kp.results[1].stdout + '\n') | b64encode }}"
      no_log: true
      when: _need_key | bool

    - name: Generate LXC-VPS WireGuard PSK
      ansible.builtin.command:
        cmd: python3 -c "import os, base64; print(base64.b64encode(os.urandom(32)).decode())"
      register: _lxc_psk
      changed_when: true
      no_log: true
      when: _need_lxc_psk | bool

    - name: Set LXC PSK fact
      ansible.builtin.set_fact:
        _new_lxc_psk: "{{ _lxc_psk.stdout }}"
      no_log: true
      when: _need_lxc_psk | bool

    - name: Generate PSKs for extra peers missing one
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - |
            import os, base64, json, sys
            peers = json.loads(sys.argv[1])
            for p in peers:
                if not p.get('preshared_key'):
                    p['preshared_key'] = base64.b64encode(os.urandom(32)).decode()
            print(json.dumps(peers))
          - "{{ _existing.wireguard.extra_peers | to_json }}"
      register: _updated_peers_result
      no_log: true
      changed_when: true
      when: _need_peer_psks | bool

    - name: Set updated peers fact
      ansible.builtin.set_fact:
        _updated_extra_peers: "{{ _updated_peers_result.stdout | from_json }}"
      no_log: true
      when: _need_peer_psks | bool

    - name: Write merged config (plaintext; encrypted next)
      ansible.builtin.copy:
        dest: "{{ config_file }}"
        mode: "0600"
        content: "{{ _existing
          | combine({'lxc': _existing.lxc | combine({
              'ssh_public_key': _new_ssh_public_key | default(_existing.lxc.ssh_public_key | default('')),
              'ansible_ssh_private_key': _new_ssh_private_key | default(_existing.lxc.ansible_ssh_private_key | default(''))
            })}, recursive=true)
          | combine({'wireguard': _existing.wireguard | combine({
              'psk_lxc': _new_lxc_psk | default(_existing.wireguard.psk_lxc | default('')),
              'extra_peers': _updated_extra_peers | default(_existing.wireguard.extra_peers)
            })}, recursive=true)
          | to_nice_yaml(width=4096) }}"
      no_log: true
      when: _need_key | bool or _need_lxc_psk | bool or _need_peer_psks | bool

    - name: Encrypt config in place with SOPS
      ansible.builtin.command:
        cmd: "sops --encrypt --in-place {{ config_file }}"
      changed_when: true
      when: _need_key | bool or _need_lxc_psk | bool or _need_peer_psks | bool

    - name: Remove temp keypair
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ _tmp_key }}"
        - "{{ _tmp_key }}.pub"
      when: _need_key | bool

    - name: Summary
      ansible.builtin.debug:
        msg: |
          Done. Next steps:
          1. Fill in any FILL_ME values: sops config.sops.yaml
          2. Add preshared_key from config to each device's WireGuard [Peer] block:
               PresharedKey = <wireguard.extra_peers[].preshared_key>
