---
all:
  children:
    vps:
      hosts:
        oracle-vps:
          ansible_host: "{{ vps.public_ip }}"
          ansible_user: "{{ vps.ssh_user }}"
          ansible_ssh_private_key_file: /tmp/ansible_vps_key

    proxmox_nodes:
      hosts:
        pve01:
          ansible_host: "{{ proxmox.endpoint | urlsplit('hostname') }}"
          ansible_user: "{{ proxmox.ssh_user }}"
          ansible_ssh_private_key_file: /tmp/ansible_pve_key
          ansible_become: true
          ansible_become_method: sudo

    lxc_gateways:
      hosts:
        edge-gateway:
          ansible_host: "{{ lxc.ip.split('/')[0] }}"
          ansible_user: "{{ lxc.ssh_user }}"
          ansible_ssh_private_key_file: /tmp/ansible_lxc_key
          ansible_ssh_common_args: >-
            -o ProxyCommand="ssh -i /tmp/ansible_pve_key -W %h:%p
            -o StrictHostKeyChecking=accept-new
            {{ proxmox.ssh_user }}@{{ proxmox.endpoint | urlsplit('hostname') }}"
