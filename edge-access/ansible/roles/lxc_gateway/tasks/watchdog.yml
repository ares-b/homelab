---
- name: LXC Gateway | Watchdog | Deploy watchdog script
  ansible.builtin.template:
    src: wg-watchdog.sh.j2
    dest: /usr/local/sbin/wg-watchdog.sh
    owner: root
    group: root
    mode: "0755"

- name: LXC Gateway | Watchdog | Deploy systemd service
  ansible.builtin.template:
    src: wg-watchdog.service.j2
    dest: /etc/systemd/system/wg-watchdog.service
    owner: root
    group: root
    mode: "0644"

- name: LXC Gateway | Watchdog | Deploy systemd timer
  ansible.builtin.template:
    src: wg-watchdog.timer.j2
    dest: /etc/systemd/system/wg-watchdog.timer
    owner: root
    group: root
    mode: "0644"

- name: LXC Gateway | Watchdog | Enable and start timer
  ansible.builtin.systemd:
    name: wg-watchdog.timer
    state: started
    enabled: true
    daemon_reload: true
