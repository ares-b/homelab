---
- name: LXC Gateway | WireGuard | Check private key exists
  ansible.builtin.stat:
    path: /etc/wireguard/private.key
  register: _wg_key_stat

- name: LXC Gateway | WireGuard | Fail if key missing
  ansible.builtin.fail:
    msg: "/etc/wireguard/private.key not found. Run site.yml (not the role directly) to bootstrap WireGuard keys first."
  when: not _wg_key_stat.stat.exists

- name: LXC Gateway | WireGuard | Read private key
  ansible.builtin.slurp:
    src: /etc/wireguard/private.key
  register: _lxc_wg_private_key

- name: LXC Gateway | WireGuard | Read VPS public key
  ansible.builtin.shell: wg pubkey < /etc/wireguard/private.key
  delegate_to: oracle-vps
  register: _vps_pubkey_result
  changed_when: false

- name: LXC Gateway | WireGuard | Deploy wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  vars:
    _private_key: "{{ _lxc_wg_private_key.content | b64decode | trim }}"
    _vps_pubkey: "{{ _vps_pubkey_result.stdout }}"
  notify: Restart wg0

- name: LXC Gateway | WireGuard | Enable and start wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    state: started
    enabled: true
    daemon_reload: true
