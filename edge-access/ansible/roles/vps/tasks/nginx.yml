---
- name: VPS | Nginx | Deploy nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c %s
  notify: Reload nginx

- name: VPS | Nginx | Remove default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: VPS | Nginx | Enable and start nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
