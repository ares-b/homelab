---
- name: Configure k8s node labels
  hosts: k3s-cp-01
  become: true
  vars:
    kubectl: k3s kubectl
  tasks:
    - name: Wait for all nodes to be Ready
      shell: |
        until k3s kubectl wait node --all --for=condition=Ready --timeout=10s 2>/dev/null; do
          sleep 10
        done
      changed_when: false
      timeout: 360

    - name: Apply storage type labels
      command: >
        {{ kubectl }} label node {{ node_name }}
        {{ disk_types | map('regex_replace', '^(.*)$', 'storage.kubernetes.io/\1=true') | join(' ') }}
        --overwrite
      vars:
        disk_types: "{{ hostvars[node_name].data_disks | default([]) | map(attribute='type') | unique | list }}"
      loop: "{{ groups['k3s'] }}"
      loop_control:
        loop_var: node_name
      when: hostvars[node_name].data_disks | default([]) | length > 0
      changed_when: false
