---
- name: Create k8s users
  hosts: k3s-cp-01
  become: true
  tasks:
    - name: Wait for k3s API
      wait_for:
        host: 127.0.0.1
        port: 6443
        timeout: 120

    - name: Apply user RBAC
      shell: |
        kubectl apply -f - <<'EOF'
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: {{ item.key }}
          namespace: kube-system
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{ item.key }}-token
          namespace: kube-system
          annotations:
            kubernetes.io/service-account.name: {{ item.key }}
        type: kubernetes.io/service-account-token
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: {{ item.key }}-{{ item.value.cluster_role }}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: {{ item.value.cluster_role }}
        subjects:
          - kind: ServiceAccount
            name: {{ item.key }}
            namespace: kube-system
        EOF
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      loop: "{{ k8s_users | dict2items }}"
      changed_when: true

    - name: Wait for tokens to be populated
      shell: |
        kubectl get secret {{ item.key }}-token -n kube-system -o jsonpath='{.data.token}'
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: token_checks
      until: token_checks.stdout != ""
      retries: 10
      delay: 3
      loop: "{{ k8s_users | dict2items }}"
      changed_when: false

    - name: Fetch user credentials
      shell: |
        echo "ca=$(kubectl get secret {{ item.key }}-token -n kube-system -o jsonpath='{.data.ca\.crt}')"
        echo "token=$(kubectl get secret {{ item.key }}-token -n kube-system -o jsonpath='{.data.token}' | base64 -d)"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: user_creds
      loop: "{{ k8s_users | dict2items }}"
      changed_when: false

    - name: Set credentials facts
      set_fact:
        k8s_credentials: >-
          {{
            k8s_credentials | default({}) | combine({
              item.item.key: {
                'ca': (item.stdout_lines | select('match', '^ca=') | first)[3:],
                'token': (item.stdout_lines | select('match', '^token=') | first)[6:],
                'server': 'https://' + ansible_host + ':6443',
                'kubeconfig': item.item.value.kubeconfig
              }
            })
          }}
      loop: "{{ user_creds.results }}"

- name: Write kubeconfigs
  hosts: k3s-cp-01
  gather_facts: false
  tasks:
    - name: Ensure ~/.kube exists
      delegate_to: localhost
      become: false
      file:
        path: "{{ lookup('env', 'HOME') }}/.kube"
        state: directory
        mode: "0700"

    - name: Configure kubeconfig for each user
      when: cred.value.kubeconfig
      vars:
        cred: "{{ item }}"
      delegate_to: localhost
      become: false
      block:
        - name: Write CA to temp file
          shell: echo "{{ cred.value.ca }}" | base64 -d > /tmp/{{ cred.key }}-ca.crt
          changed_when: true

        - name: Set cluster
          command: >
            kubectl config set-cluster homelab
            --server={{ cred.value.server }}
            --certificate-authority=/tmp/{{ cred.key }}-ca.crt
            --embed-certs=true

        - name: Set credentials
          command: kubectl config set-credentials {{ cred.key }} --token={{ cred.value.token }}

        - name: Set context
          command: kubectl config set-context homelab --cluster=homelab --user={{ cred.key }}

        - name: Use context
          command: kubectl config use-context homelab

        - name: Remove temp CA file
          file:
            path: /tmp/{{ cred.key }}-ca.crt
            state: absent
      loop: "{{ k8s_credentials | dict2items }}"
      loop_control:
        loop_var: item
