---
- name: Reconcile k8s users
  hosts: k3s-cp-01
  become: true
  vars:
    kubectl: k3s kubectl
  tasks:
    - name: Wait for k3s API
      wait_for:
        host: 127.0.0.1
        port: 6443
        timeout: 120

    - name: Get existing managed users
      shell: >
        {{ kubectl }} get sa -n kube-system
        -l 'app.kubernetes.io/managed-by=terraform'
        -o 'jsonpath={range .items[*]}{.metadata.name}{"\n"}{end}'
      register: existing_users
      changed_when: false

    - name: Delete removed users
      shell: >
        {{ kubectl }} delete
        sa/{{ item }}
        secret/{{ item }}-token
        clusterrolebinding/{{ item }}-binding
        -n kube-system --ignore-not-found
      loop: "{{ existing_users.stdout_lines | difference(k8s_users.keys() | list) }}"

    - name: Apply ServiceAccounts and Secrets
      shell: |
        {{ kubectl }} apply -f - <<'MANIFEST'
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: {{ item.key }}
          namespace: kube-system
          labels:
            app.kubernetes.io/managed-by: terraform
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: {{ item.key }}-token
          namespace: kube-system
          labels:
            app.kubernetes.io/managed-by: terraform
          annotations:
            kubernetes.io/service-account.name: {{ item.key }}
        type: kubernetes.io/service-account-token
        MANIFEST
      register: _sa_apply
      loop: "{{ k8s_users | dict2items }}"
      changed_when: "'created' in _sa_apply.stdout or 'configured' in _sa_apply.stdout"

    - name: Sync ClusterRoleBindings
      shell: |
        current=$({{ kubectl }} get clusterrolebinding {{ item.key }}-binding \
          -o jsonpath='{.roleRef.name}' 2>/dev/null || true)
        if [ -n "$current" ] && [ "$current" != "{{ item.value.cluster_role }}" ]; then
          {{ kubectl }} delete clusterrolebinding {{ item.key }}-binding
        fi
        {{ kubectl }} apply -f - <<'MANIFEST'
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: {{ item.key }}-binding
          labels:
            app.kubernetes.io/managed-by: terraform
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: {{ item.value.cluster_role }}
        subjects:
          - kind: ServiceAccount
            name: {{ item.key }}
            namespace: kube-system
        MANIFEST
      register: _crb_apply
      loop: "{{ k8s_users | dict2items }}"
      changed_when: "'created' in _crb_apply.stdout or 'configured' in _crb_apply.stdout or 'deleted' in _crb_apply.stdout"
