---
- name: Prepare k3s node host directories
  hosts: k3s
  become: true
  gather_facts: false
  tasks:
    # topolvm's CSI plugin races to register its socket here at kubelet start;
    # pre-create the dir. In Ansible so existing nodes get it, not just fresh.
    - name: Ensure kubelet plugins_registry directory exists
      ansible.builtin.file:
        path: /var/lib/kubelet/plugins_registry
        state: directory
        mode: "0750"
