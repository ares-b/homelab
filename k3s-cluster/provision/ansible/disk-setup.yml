---
# Create one LVM volume group per data disk. topolvm consumes the VGs and
# manages logical volumes dynamically, so no LV/filesystem/mount is created here.
- name: Set up LVM volume groups for topolvm
  hosts: k3s
  become: true
  gather_facts: false
  tasks:
    - name: Skip host without data disks
      ansible.builtin.meta: end_host
      when: data_disks | default([]) | length == 0

    - name: Install lvm2
      ansible.builtin.apt:
        name: lvm2
        state: present
        update_cache: false

    - name: Check data disk devices exist
      ansible.builtin.stat:
        path: "{{ item.device }}"
      register: disk_stat
      loop: "{{ data_disks }}"
      loop_control:
        label: "{{ item.device }}"

    - name: Fail if a data disk is missing
      ansible.builtin.fail:
        msg: "{{ item.item.device }} not found on {{ inventory_hostname }}"
      when: not item.stat.exists
      loop: "{{ disk_stat.results }}"
      loop_control:
        label: "{{ item.item.device }}"

    - name: Ensure volume group per data disk
      community.general.lvg:
        vg: "{{ item.vg_name }}"
        pvs: "{{ item.device }}"
      loop: "{{ data_disks }}"
      loop_control:
        label: "{{ item.vg_name }} ({{ item.device }})"
