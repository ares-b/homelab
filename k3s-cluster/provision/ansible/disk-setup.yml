---
- name: Format and mount data disks
  hosts: k3s
  become: true
  tasks:
    - name: Skip host without data disks
      meta: end_host
      when: data_disks | default([]) | length == 0

    - name: Check disks exist
      stat:
        path: "{{ item.device }}"
      register: disk_stats
      loop: "{{ data_disks }}"

    - name: Fail if disk missing
      fail:
        msg: "{{ item.item.device }} not found on {{ inventory_hostname }}"
      when: not item.stat.exists
      loop: "{{ disk_stats.results }}"

    - name: Check existing filesystems
      command: blkid {{ item.device }}
      register: blkid_results
      changed_when: false
      failed_when: false
      loop: "{{ data_disks }}"

    - name: Format disks without filesystem
      command: mkfs.{{ item.item.fs }} -L {{ item.item.label }} {{ item.item.device }}
      when: item.rc != 0
      loop: "{{ blkid_results.results }}"

    - name: Create mount points
      file:
        path: "{{ item.mount }}"
        state: directory
        mode: "0755"
      loop: "{{ data_disks }}"

    - name: Mount disks
      mount:
        path: "{{ item.mount }}"
        src: "LABEL={{ item.label }}"
        fstype: "{{ item.fs }}"
        opts: defaults,nofail
        state: mounted
      loop: "{{ data_disks }}"
