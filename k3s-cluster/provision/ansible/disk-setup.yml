---
- name: Set up LVM on data disks
  hosts: k3s
  become: true
  tasks:
    - name: Skip host without data disks
      meta: end_host
      when: data_disks | default([]) | length == 0

    - name: Install lvm2
      apt:
        name: lvm2
        state: present
        update_cache: false

    - name: Check disk devices exist
      stat:
        path: "{{ item.device }}"
      register: disk_stats
      loop: "{{ data_disks }}"

    - name: Fail if disk missing
      fail:
        msg: "{{ item.item.device }} not found on {{ inventory_hostname }}"
      when: not item.stat.exists
      loop: "{{ disk_stats.results }}"

    - name: Check existing volume groups
      command: vgs --noheadings -o vg_name
      register: existing_vgs
      changed_when: false
      failed_when: false

    - name: Unmount disk and remove fstab entry
      shell: |
        mount_point=$(lsblk -no MOUNTPOINT {{ item.device }} 2>/dev/null | tr -d ' ')
        [ -n "$mount_point" ] && umount "{{ item.device }}" || true
        sed -i '\|LABEL=k3s-{{ item.type }}|d' /etc/fstab
      loop: "{{ data_disks }}"
      when: item.vg_name not in (existing_vgs.stdout_lines | map('trim') | list)
      changed_when: false

    - name: Create LVM physical volume
      command: pvcreate -ff -y {{ item.device }}
      loop: "{{ data_disks }}"
      when: item.vg_name not in (existing_vgs.stdout_lines | map('trim') | list)

    - name: Create LVM volume group
      command: vgcreate {{ item.vg_name }} {{ item.device }}
      loop: "{{ data_disks }}"
      when: item.vg_name not in (existing_vgs.stdout_lines | map('trim') | list)
