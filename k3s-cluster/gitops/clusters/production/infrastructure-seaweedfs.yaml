apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-seaweedfs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  # Needs the ServiceMonitor CRD from the monitoring stack.
  dependsOn:
    - name: infrastructure-monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s-cluster/gitops/infrastructure/apps/seaweedfs
  prune: true
  wait: true
  timeout: 10m
