apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-rustfs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  # Needs the SealedSecret CRD + controller from the platform layer.
  dependsOn:
    - name: infrastructure-platform
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s-cluster/gitops/infrastructure/apps/rustfs
  prune: true
  wait: true
  timeout: 10m
