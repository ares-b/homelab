apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure-monitoring
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s-cluster/gitops/infrastructure/apps
  prune: true
  wait: true
  timeout: 15m
