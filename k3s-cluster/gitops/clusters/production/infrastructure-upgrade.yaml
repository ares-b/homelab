apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-upgrade
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-platform
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s-cluster/gitops/infrastructure/platform/system-upgrade/plans
  prune: true
