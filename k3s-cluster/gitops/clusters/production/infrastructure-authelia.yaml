apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-authelia
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  dependsOn:
    - name: infrastructure-platform
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s-cluster/gitops/infrastructure/platform/authelia
  prune: true
  wait: true
  timeout: 5m
