apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-lakekeeper
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  # Needs the lakekeeper + openfga databases from the postgresql cluster.
  dependsOn:
    - name: infrastructure-postgresql
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s-cluster/gitops/infrastructure/apps/lakekeeper
  prune: true
  wait: true
  timeout: 10m
