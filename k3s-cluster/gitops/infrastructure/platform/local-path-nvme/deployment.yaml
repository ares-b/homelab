apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-path-nvme-provisioner
  namespace: local-path-nvme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-path-nvme-provisioner
  template:
    metadata:
      labels:
        app: local-path-nvme-provisioner
    spec:
      serviceAccountName: local-path-nvme-service-account
      containers:
        - name: local-path-nvme-provisioner
          image: rancher/local-path-provisioner:v0.0.36
          imagePullPolicy: IfNotPresent
          command:
            - local-path-provisioner
            - start
            - --config
            - /etc/config/config.json
            - --provisioner-name
            - rancher.io/local-path-nvme
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config/
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: local-path-nvme-config
        - name: tmp
          emptyDir: {}
