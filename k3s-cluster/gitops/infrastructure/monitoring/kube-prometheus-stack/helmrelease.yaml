apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  dependsOn:
    - name: sealed-secrets
      namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.2.3"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    kubeEtcd:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false

    grafana:
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: nvme
        size: 10Gi
      grafana.ini:
        server:
          domain: grafana.int.edgedatalab.com
          root_url: https://grafana.int.edgedatalab.com
        analytics:
          reporting_enabled: false
          check_for_updates: false
        security:
          cookie_secure: true
        users:
          auto_assign_org_role: Viewer
        auth.proxy:
          enabled: true
          header_name: Remote-User
          header_property: username
          auto_sign_up: true
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.int.edgedatalab.com
        scrapeInterval: 30s
        evaluationInterval: 30s
        retention: 30d
        walCompression: true
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        ruleSelectorNilUsesHelmValues: false
        ruleSelector: {}
        ruleNamespaceSelector: {}
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              storageClassName: nvme
              resources:
                requests:
                  storage: 50Gi

    alertmanager:
      alertmanagerSpec:
        secrets:
          - alertmanager-telegram
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        storage:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              storageClassName: nvme
              resources:
                requests:
                  storage: 10Gi
      config:
        route:
          receiver: telegram
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: "null"
              matchers:
                - alertname = "InfoInhibitor"
        receivers:
          - name: "null"
          - name: telegram
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/token
                chat_id: 1299519936
                send_resolved: true
        inhibit_rules:
          - source_matchers:
              - alertname = "InfoInhibitor"
            target_matchers:
              - severity = "info"
            equal:
              - namespace
