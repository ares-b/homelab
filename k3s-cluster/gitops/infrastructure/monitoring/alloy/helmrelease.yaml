apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  dependsOn:
    - name: loki
      namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: alloy
      version: "1.10.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    controller:
      type: daemonset
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      volumes:
        extra:
          - name: alloy-storage
            hostPath:
              path: /var/lib/alloy
              type: DirectoryOrCreate

    alloy:
      storagePath: /var/lib/alloy
      enableReporting: false

      extraEnv:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

      mounts:
        varlog: true
        dockercontainers: false
        extra:
          - name: alloy-storage
            mountPath: /var/lib/alloy

      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

      configMap:
        create: true
        content: |
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            // Scope each DaemonSet pod to its own node
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              action        = "keep"
              regex         = env("NODE_NAME")
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_phase"]
              action        = "drop"
              regex         = "Succeeded|Failed"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              separator     = "/"
              regex         = "(.+)/(.+)"
              target_label  = "__path__"
              replacement   = "/var/log/pods/*$1/$2/*.log"
            }

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }

            // app label: generic first, app.kubernetes.io/name wins if set
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app"]
              target_label  = "app"
              regex         = "(.+)"
              replacement   = "$1"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
              regex         = "(.+)"
              replacement   = "$1"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_label_dagster_run_id"]
              target_label  = "dagster_run_id"
              regex         = "(.+)"
              replacement   = "$1"
            }
          }

          // local.file_match expands __path__ globs; loki.source.file requires concrete paths
          local.file_match "pods" {
            path_targets = discovery.relabel.pods.output
            sync_period  = "5s"
          }

          loki.source.file "pods" {
            targets    = local.file_match.pods.targets
            forward_to = [loki.process.filter.receiver]
          }

          loki.process "filter" {
            stage.cri {}

            // To add a namespace: "dagster|other". To ship everything: remove this stage.
            stage.match {
              selector = `{namespace!~"dagster"}`
              action   = "drop"
            }

            stage.json {
              expressions = {
                level = "level",
              }
            }

            stage.labels {
              values = {
                level = "",
              }
            }

            forward_to = [loki.write.loki.receiver]
          }

          loki.write "loki" {
            endpoint {
              url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
            }
            external_labels = {
              cluster = "k3s-production",
            }
          }

    serviceMonitor:
      enabled: true
