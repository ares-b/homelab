# No Authelia ForwardAuth: S3 clients authenticate with AWS Sig-V4, which a proxy
# auth layer would break. Host resolves to the LAN only (split-horizon DNS).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seaweedfs-s3
  namespace: seaweedfs
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`s3.seaweedfs.int.edgedatalab.com`)
      kind: Rule
      services:
        - name: seaweedfs-s3
          port: 8333
  tls:
    certResolver: letsencrypt
