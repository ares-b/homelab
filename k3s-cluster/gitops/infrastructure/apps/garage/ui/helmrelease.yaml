apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage-ui
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: garage
  dependsOn:
    - name: sealed-secrets
      namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: garage-ui
      version: "0.6.1"
      sourceRef:
        kind: HelmRepository
        name: garage-ui
        namespace: flux-system
  values:
    config:
      server:
        environment: production
        domain: garage.int.edgedatalab.com
        protocol: https
        root_url: https://garage.int.edgedatalab.com
      garage:
        endpoint: http://garage.garage.svc.cluster.local:3900
        region: garage
        admin_endpoint: http://garage.garage.svc.cluster.local:3903
        existingSecret:
          name: garage-admin
          key: admin-token
      auth:
        token:
          enabled: true
        oidc:
          enabled: true
          provider_name: Authelia
          client_id: garage-ui
          existingSecret:
            name: garage-ui-oidc
            key: client-secret
          scopes:
            - openid
            - email
            - profile
            - groups
          issuer_url: https://auth.int.edgedatalab.com
          skip_issuer_check: false
          skip_expiry_check: false
          email_attribute: email
          username_attribute: preferred_username
          name_attribute: name
          role_attribute_path: groups
          admin_role: admins
      logging:
        level: info
        format: json
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    serviceMonitor:
      enabled: false
