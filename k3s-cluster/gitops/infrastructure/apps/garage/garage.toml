metadata_dir = "/var/lib/garage/meta"
data_dir     = "/var/lib/garage/data"

replication_factor = 2

rpc_secret    = "PLACEHOLDER_RPC_SECRET"
rpc_bind_addr = "0.0.0.0:3901"
rpc_public_addr = "PLACEHOLDER_POD_NAME.garage-headless.garage.svc.cluster.local:3901"

# Avoids pinning node IDs, which regenerate on a fresh reinstall and break a static peer list.
[kubernetes_discovery]
namespace    = "garage"
service_name = "garage"
skip_crd     = false

[s3_api]
api_bind_addr = "0.0.0.0:3900"
s3_region     = "garage"

[admin]
api_bind_addr = "0.0.0.0:3903"
admin_token   = "PLACEHOLDER_ADMIN_TOKEN"
