apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: postgresql
  annotations:
    # Never let Flux prune the database cluster (e.g. during Kustomization moves).
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.10
  storage:
    size: 50Gi
    storageClass: ssd
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  managed:
    roles:
      - name: dagster
        ensure: present
        login: true
        createdb: false
        superuser: false
        passwordSecret:
          name: dagster-cnpg-role
      - name: iceberg
        ensure: present
        login: true
        createdb: false
        superuser: false
        passwordSecret:
          name: iceberg-cnpg-role
      - name: lakekeeper
        ensure: present
        login: true
        createdb: false
        superuser: false
        passwordSecret:
          name: lakekeeper-cnpg-role
      - name: openfga
        ensure: present
        login: true
        createdb: false
        superuser: false
        passwordSecret:
          name: openfga-cnpg-role
  monitoring:
    enablePodMonitor: true
