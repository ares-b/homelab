apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dagster
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: dagster
  dependsOn:
    - name: sealed-secrets
      namespace: flux-system
    - name: cnpg
      namespace: flux-system
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  chart:
    spec:
      chart: dagster
      version: "1.13.9"
      sourceRef:
        kind: HelmRepository
        name: dagster
        namespace: flux-system
  values:
    # Secret dagster-postgresql-secret comes from the SealedSecret; the chart must not generate it.
    generatePostgresqlPasswordSecret: false

    # Usage telemetry sent to telemetry.dagster.io.
    telemetry:
      enabled: false

    global:
      postgresqlSecretName: dagster-postgresql-secret

    postgresql:
      enabled: false
      postgresqlHost: postgresql-rw.postgresql.svc.cluster.local
      postgresqlUsername: dagster
      postgresqlDatabase: dagster
      service:
        port: 5432

    runLauncher:
      type: K8sRunLauncher
      config:
        k8sRunLauncher:
          loadInclusterConfig: true
          imagePullPolicy: IfNotPresent
          jobNamespace: dagster
          envVars:
            - "ICEBERG_WAREHOUSE=s3://lakehouse-warehouse/"
            - "ICEBERG_S3_ENDPOINT=http://garage.garage.svc.cluster.local:3900"
            - "ICEBERG_CATALOG_NAME=dca"
            - "ICEBERG_S3_REGION=garage"
          envSecrets:
            - name: s3-raw-secret
            - name: s3-master-secret
            - name: s3-product-secret
            - name: dagster-api-keys
            - name: iceberg-s3-secret
            - name: iceberg-catalog
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          runK8sConfig:
            podSpecConfig:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: node-role.kubernetes.io/control-plane
                            operator: DoesNotExist

    dagsterWebserver:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    dagsterDaemon:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    rbacEnabled: true

    serviceAccount:
      create: true

    dagster-user-deployments:
      enabled: true
      enableSubchart: true
      deployments:
        - name: crypto-ai-analysis
          image:
            repository: ghcr.io/ares-b/crypto_ai_analysis
            tag: v0.2.4
            pullPolicy: Always
          dagsterApiGrpcArgs:
            - "--module-name"
            - "orchestration"
          port: 3030
          env:
            - name: ICEBERG_WAREHOUSE
              value: "s3://lakehouse-warehouse/"
            - name: ICEBERG_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            - name: ICEBERG_CATALOG_NAME
              value: "dca"
            - name: ICEBERG_S3_REGION
              value: "garage"
          envSecrets:
            - name: s3-raw-secret
            - name: s3-master-secret
            - name: s3-product-secret
            - name: dagster-api-keys
            - name: iceberg-s3-secret
            - name: iceberg-catalog
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
