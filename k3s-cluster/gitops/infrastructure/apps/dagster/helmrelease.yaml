apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dagster
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: dagster
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: dagster
      version: "1.13.9"
      sourceRef:
        kind: HelmRepository
        name: dagster
        namespace: flux-system
  values:
    global:
      postgresqlSecretName: dagster-postgresql-secret

    postgresql:
      enabled: false
      postgresqlHost: postgresql-rw.postgresql.svc.cluster.local
      postgresqlUsername: dagster
      postgresqlDatabase: dagster
      service:
        port: 5432

    runLauncher:
      type: K8sRunLauncher
      config:
        k8sRunLauncher:
          loadInclusterConfig: true
          imagePullPolicy: IfNotPresent
          jobNamespace: dagster
          envSecrets:
            - name: dagster-s3-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          runK8sConfig:
            podSpecConfig:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: node-role.kubernetes.io/control-plane
                            operator: DoesNotExist

    dagsterWebserver:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    dagsterDaemon:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    rbacEnabled: true

    serviceAccount:
      create: true

    dagster-user-deployments:
      enableSubchart: false
      deployments: []
