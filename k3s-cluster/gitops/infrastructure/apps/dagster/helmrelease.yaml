apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dagster
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: dagster
  dependsOn:
    - name: sealed-secrets
      namespace: flux-system
    - name: cnpg
      namespace: flux-system
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  chart:
    spec:
      chart: dagster
      version: "1.13.9"
      sourceRef:
        kind: HelmRepository
        name: dagster
        namespace: flux-system
  values:
    # Secret dagster-postgresql-secret comes from the SealedSecret; the chart must not generate it.
    generatePostgresqlPasswordSecret: false

    # Usage telemetry sent to telemetry.dagster.io.
    telemetry:
      enabled: false

    global:
      postgresqlSecretName: dagster-postgresql-secret

    postgresql:
      enabled: false
      postgresqlHost: postgresql-rw.postgresql.svc.cluster.local
      postgresqlUsername: dagster
      postgresqlDatabase: dagster
      service:
        port: 5432

    # Catalog config (env, token, api keys) lives per code location and reaches runs via
    # includeConfigInLaunchedRuns, so the shared launcher only sets run-pod placement/size.
    runLauncher:
      type: K8sRunLauncher
      config:
        k8sRunLauncher:
          loadInclusterConfig: true
          imagePullPolicy: IfNotPresent
          jobNamespace: dagster
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              memory: 768Mi
          runK8sConfig:
            podSpecConfig:
              priorityClassName: dagster-run
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                      - matchExpressions:
                          - key: node-role.kubernetes.io/control-plane
                            operator: DoesNotExist

    dagsterWebserver:
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    dagsterDaemon:
      enabled: true
      runMonitoring:
        enabled: true
        maxResumeRunAttempts: 0
      runRetries:
        enabled: true
        maxRetries: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    rbacEnabled: true

    serviceAccount:
      create: true

    dagster-user-deployments:
      enabled: true
      enableSubchart: true
      deployments:
        - name: crypto-ai-analysis
          image:
            repository: ghcr.io/ares-b/crypto_ai_analysis
            tag: v0.5.1
            pullPolicy: Always
          dagsterApiGrpcArgs:
            - "--module-name"
            - "orchestration"
          port: 3030
          includeConfigInLaunchedRuns:
            enabled: true
          env:
            - name: ICEBERG_CATALOG_URI
              value: "http://lakekeeper.lakekeeper.svc.cluster.local:8181/catalog"
            - name: ICEBERG_CATALOG_WAREHOUSE
              value: "crypto-ai-analysis"
            - name: ICEBERG_CATALOG_TOKEN_FILE
              value: "/var/run/secrets/tokens/catalog"
          envSecrets:
            - name: dagster-api-keys
          volumes:
            - name: catalog-token
              projected:
                sources:
                  # audience must match the catalog's k8s auth audience.
                  - serviceAccountToken:
                      path: catalog
                      audience: lakekeeper
                      expirationSeconds: 3600
          volumeMounts:
            - name: catalog-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
