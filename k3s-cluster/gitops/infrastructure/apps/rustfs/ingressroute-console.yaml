# No Authelia ForwardAuth: the console authenticates users itself via OIDC SSO
# against Authelia. Layering forward-auth in front breaks the console's own OIDC
# callback (the portal interstitial clobbers the console OAuth state/session cookie),
# which surfaces as "Your session has expired. Please log in again."
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs-console
  namespace: rustfs
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rustfs.int.edgedatalab.com`)
      kind: Rule
      services:
        - name: rustfs-console
          port: 9001
  tls:
    certResolver: letsencrypt
