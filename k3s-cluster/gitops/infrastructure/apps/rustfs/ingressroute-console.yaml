apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rustfs-console
  namespace: rustfs
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`rustfs.int.edgedatalab.com`)
      kind: Rule
      middlewares:
        - name: forwardauth
          namespace: authelia
      services:
        - name: rustfs-console
          port: 9001
  tls:
    certResolver: letsencrypt
