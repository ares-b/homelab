apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: rustfs
  releaseName: rustfs
  dependsOn:
    - name: sealed-secrets
      namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: rustfs
      version: "0.9.1"
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: flux-system
  # The chart's extraEnvVars leaks into the ConfigMap (and can't hold a secret), so the
  # OIDC env is injected onto the deployment here instead.
  #
  # Console SSO ("Login with Authelia"). The env provider has the fixed id "default", so the
  # callback path is .../oidc/callback/default. RustFS runs http behind traefik, so
  # REDIRECT_URI is pinned to the external https URL (it can't infer the edge scheme).
  # RustFS reads policy names from GROUPS_CLAIM, so GROUPS_CLAIM=roles maps Authelia's
  # roles=["consoleAdmin"] onto the built-in consoleAdmin policy. "roles" is a custom claim,
  # released only via the rustfs_roles scope, which must therefore be in both SCOPES and the
  # Authelia client. USERNAME_CLAIM avoids the user showing up as the rustfsAdmin root
  # (rustfs#2612).
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: rustfs
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_ENABLE, value: "true" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_CONFIG_URL, value: "https://auth.int.edgedatalab.com/.well-known/openid-configuration" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_CLIENT_ID, value: "rustfs" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: RUSTFS_IDENTITY_OPENID_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: rustfs-oidc
                      key: client-secret
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_REDIRECT_URI, value: "https://rustfs.int.edgedatalab.com/rustfs/admin/v3/oidc/callback/default" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_SCOPES, value: "openid,profile,email,rustfs_roles" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_GROUPS_CLAIM, value: "roles" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_USERNAME_CLAIM, value: "preferred_username" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_EMAIL_CLAIM, value: "email" }
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value: { name: RUSTFS_IDENTITY_OPENID_DISPLAY_NAME, value: "Authelia" }
          # OIDC client secret + root creds are injected as env, which never refreshes in a
          # running pod, so roll the deployment when those secrets change.
          - target:
              kind: Deployment
              name: rustfs
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: rustfs
                annotations:
                  secret.reloader.stakater.com/reload: "rustfs-oidc,rustfs-auth"
  values:
    fullnameOverride: rustfs

    # Chart 0.9.1 pins beta.1; track the current latest RustFS (beta.8).
    image:
      tag: "1.0.0-beta.8"

    auth:
      existingSecret: rustfs-auth

    config:
      address: "0.0.0.0:9000"
      consoleAddress: "0.0.0.0:9001"
      consoleEnabled: true
      logLevel: "info"
      # Empty disables RustFS TLS; traefik terminates TLS at the edge and proxies http.
      tlsPath: ""
      # External port traefik terminates TLS on, used when RustFS builds absolute URLs.
      externalAddress: ":443"
      # Browser DuckDB (served from the Lakekeeper origin) reads objects cross-origin.
      corsAllowedOrigins: "https://lakekeeper.int.edgedatalab.com"
      consoleCorsAllowedOrigins: "https://rustfs.int.edgedatalab.com"

    # Declarative IAM: a scoped policy + the lakekeeper user + the warehouse bucket,
    # all from the sealed setup secret. The policy grants only bucket s3 + sts:AssumeRole
    # (no admin), which is the least-privilege behaviour we are evaluating.
    setup:
      existingSecret: rustfs-setup
      # The chart renders the setup Pod only when these inline lists are non-empty.
      # The Pod actually mounts existingSecret (which overrides them), so the real
      # config stays sealed; these placeholders just satisfy that render gate.
      policies: [{ name: placeholder }]
      buckets: [{ name: placeholder }]
      users: [{ name: placeholder }]

    replicaCount: 1
    deploymentType: "deployment"

    dataPersistence:
      enabled: true
      storageClass: ssd
      size: 10Gi
    logsPersistence:
      enabled: false

    service:
      type: ClusterIP
      port: 9000
    consoleService:
      enabled: true
      type: ClusterIP
      port: 9001

    # TLS terminates at traefik; the chart ingress is unused.
    ingress:
      enabled: false
    consoleIngress:
      enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
