apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage-ui
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: garage
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: garage-ui
      version: "0.6.1"
      sourceRef:
        kind: HelmRepository
        name: garage-ui
        namespace: flux-system
  values:
    config:
      server:
        environment: production
        domain: garage-ui.garage.svc.cluster.local
        protocol: http
        root_url: http://garage-ui.garage.svc.cluster.local
      garage:
        endpoint: http://garage.garage.svc.cluster.local:3900
        region: garage
        admin_endpoint: http://garage.garage.svc.cluster.local:3903
        existingSecret:
          name: garage-admin
          key: admin-token
      auth:
        token:
          enabled: true
      logging:
        level: info
        format: json
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    serviceMonitor:
      enabled: true
