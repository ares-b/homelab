apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-garage-0
  namespace: garage
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 100Gi
