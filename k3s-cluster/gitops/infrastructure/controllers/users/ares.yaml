apiVersion: v1
kind: ServiceAccount
metadata:
  name: ares
  namespace: kube-system
---
apiVersion: v1
kind: Secret
metadata:
  name: ares-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: ares
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ares-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ares
    namespace: kube-system
