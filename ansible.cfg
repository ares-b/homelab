[defaults]
vars_plugins_enabled    = host_group_vars, community.sops.sops
stdout_callback         = ansible.builtin.default
result_format           = yaml
gathering               = smart
fact_caching            = memory
retry_files_enabled     = false
interpreter_python      = auto_silent
host_key_checking       = false
forks                   = 10

# roles/ and collections/ adjacent to each playbook are auto-discovered, so
# component dirs need no per-project path settings here.

[ssh_connection]
# Pipelining deadlocks with the image's sudo I/O logging (log_input/log_output):
# the module piped over stdin under sudo never returns. Keep the audit logging.
pipelining   = false
ssh_args     = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
