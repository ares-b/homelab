[defaults]
vars_plugins_enabled    = host_group_vars, community.sops.sops
stdout_callback         = ansible.builtin.default
result_format           = yaml
gathering               = smart
fact_caching            = memory
retry_files_enabled     = false
interpreter_python      = auto_silent
host_key_checking       = false
forks                   = 10

# roles/ and collections/ adjacent to each playbook are auto-discovered, so
# component dirs need no per-project path settings here.

[ssh_connection]
# Pipelining deadlocks with the image's sudo I/O logging (sudoers log_input/
# log_output): the module script piped over stdin under sudo never returns.
# Security audit logging wins; the cost is one temp-file transfer per task.
pipelining   = false
ssh_args     = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
